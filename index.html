<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixkosten-Planer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        :root {
            --beige-light: #F5E6D3;
            --beige-medium: #EAD8C3;
            --beige-dark: #D4C4B0;
            --accent: #8B7355;
            --text-dark: #2C2C2C;
            --success: #6BA587;
            --error: #C97A7A;
            --white: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--beige-light) 0%, var(--beige-medium) 100%);
            color: var(--text-dark);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid var(--beige-dark);
            padding-bottom: 20px;
        }

        h1 {
            color: var(--accent);
            font-size: 28px;
            margin-bottom: 5px;
        }

        .subtitle {
            color: var(--accent);
            font-size: 14px;
            opacity: 0.8;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: linear-gradient(135deg, var(--beige-light) 0%, var(--beige-medium) 100%);
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid var(--accent);
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: var(--text-dark);
        }

        .form-section {
            background: var(--beige-light);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            border: 2px solid var(--beige-dark);
        }

        .form-title {
            font-size: 18px;
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 15px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 12px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
            font-weight: 600;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 2px solid var(--beige-dark);
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            background: var(--white);
            color: var(--text-dark);
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(139, 115, 85, 0.1);
        }

        .form-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-add {
            background: var(--accent);
            color: var(--white);
            flex: 1;
        }

        .btn-add:hover {
            background: #6B5345;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(139, 115, 85, 0.3);
        }

        .table-section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 18px;
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--white);
            border-radius: 10px;
            overflow: hidden;
        }

        thead {
            background: var(--beige-dark);
            color: var(--text-dark);
        }

        th {
            padding: 12px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid var(--beige-light);
        }

        tbody tr:hover {
            background: var(--beige-light);
        }

        .btn-edit, .btn-delete {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-edit {
            background: #8EAAD4;
            color: var(--white);
            margin-right: 5px;
        }

        .btn-edit:hover {
            background: #6B8DB8;
        }

        .btn-delete {
            background: var(--error);
            color: var(--white);
        }

        .btn-delete:hover {
            background: #A85F5F;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--accent);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .success-message {
            background: var(--success);
            color: var(--white);
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            opacity: 0;
            animation: slideIn 0.3s ease forwards;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--white);
            padding: 30px;
            border-radius: 12px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }

        .modal-title {
            font-size: 18px;
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 20px;
        }

        .modal-form-grid {
            display: grid;
            gap: 15px;
            margin-bottom: 20px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-save, .btn-cancel {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-save {
            background: var(--accent);
            color: var(--white);
        }

        .btn-save:hover {
            background: #6B5345;
        }

        .btn-cancel {
            background: var(--beige-dark);
            color: var(--text-dark);
        }

        .btn-cancel:hover {
            background: var(--beige-dark);
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💰 Fixkosten-Planer</h1>
            <p class="subtitle">Übersicht deiner monatlichen Fixkosten</p>
        </header>

        <div id="successMessage" class="success-message"></div>

        <!-- Statistiken -->
        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-label">Gesamt / Monat</div>
                <div class="stat-value" id="totalAmount">€ 0,00</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Geschäftlich / Monat</div>
                <div class="stat-value" id="businessAmount">€ 0,00</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Privat / Monat</div>
                <div class="stat-value" id="privateAmount">€ 0,00</div>
            </div>
        </div>

        <!-- Eingabeformular -->
        <div class="form-section">
            <div class="form-title">Neue Fixkosten hinzufügen</div>
            <div class="form-grid">
                <div>
                    <label>Kostenname</label>
                    <input type="text" id="costName" placeholder="z.B. Adobe Abo">
                </div>
                <div>
                    <label>Betrag / Monat (€)</label>
                    <input type="number" id="costAmount" placeholder="z.B. 60,00" step="0.01" min="0">
                </div>
                <div>
                    <label>Kategorie</label>
                    <select id="costCategory">
                        <option value="">-- Wählen --</option>
                        <optgroup label="Designsoftware & Tools">
                            <option value="Adobe Creative Cloud">Adobe Creative Cloud</option>
                            <option value="Figma">Figma</option>
                            <option value="Canva">Canva</option>
                            <option value="Andere Design-Tools">Andere Design-Tools</option>
                        </optgroup>
                        <optgroup label="Webseite & Portfolio">
                            <option value="Hosting">Hosting</option>
                            <option value="Domain">Domain</option>
                            <option value="Webseite-Verwaltung">Webseite-Verwaltung</option>
                            <option value="Email-Service">Email-Service</option>
                        </optgroup>
                        <optgroup label="Geschäftliches">
                            <option value="Buchhaltung-Software">Buchhaltung-Software</option>
                            <option value="Projektmanagement">Projektmanagement</option>
                            <option value="CRM">CRM</option>
                            <option value="Versicherung">Versicherung</option>
                        </optgroup>
                        <optgroup label="Marketing & Kommunikation">
                            <option value="Social Media Tools">Social Media Tools</option>
                            <option value="Email-Marketing">Email-Marketing</option>
                            <option value="SEO-Tools">SEO-Tools</option>
                            <option value="Anzeigen">Anzeigen (Ads)</option>
                        </optgroup>
                        <optgroup label="Raum & Nebenkosten">
                            <option value="Miete Büro">Miete Büro</option>
                            <option value="Nebenkosten">Nebenkosten</option>
                            <option value="Internet">Internet</option>
                            <option value="Telefon">Telefon</option>
                        </optgroup>
                        <optgroup label="Fahrzeug & Reisen">
                            <option value="Fahrzeug-Kosten">Fahrzeug-Kosten</option>
                            <option value="Benzin">Benzin</option>
                            <option value="Reisekosten">Reisekosten</option>
                        </optgroup>
                        <optgroup label="Sonstiges">
                            <option value="Fortbildung">Fortbildung</option>
                            <option value="Sonstiges">Sonstiges</option>
                        </optgroup>
                    </select>
                </div>
                <div>
                    <label>Klassifizierung</label>
                    <select id="costType">
                        <option value="geschäftlich">Geschäftlich</option>
                        <option value="privat">Privat</option>
                        <option value="gemischt">Gemischt (50/50)</option>
                    </select>
                </div>
            </div>
            <div class="form-buttons">
                <button class="btn-add" onclick="addCost()">+ Fixkosten hinzufügen</button>
            </div>
        </div>

        <!-- Tabelle -->
        <div class="table-section">
            <div class="section-title">Übersicht aller Fixkosten</div>
            <div id="tableContainer"></div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-title">Fixkosten bearbeiten</div>
            <div class="modal-form-grid">
                <div>
                    <label>Kostenname</label>
                    <input type="text" id="editCostName">
                </div>
                <div>
                    <label>Betrag / Monat (€)</label>
                    <input type="number" id="editCostAmount" step="0.01" min="0">
                </div>
                <div>
                    <label>Kategorie</label>
                    <select id="editCostCategory">
                        <option value="">-- Wählen --</option>
                        <optgroup label="Designsoftware & Tools">
                            <option value="Adobe Creative Cloud">Adobe Creative Cloud</option>
                            <option value="Figma">Figma</option>
                            <option value="Canva">Canva</option>
                            <option value="Andere Design-Tools">Andere Design-Tools</option>
                        </optgroup>
                        <optgroup label="Webseite & Portfolio">
                            <option value="Hosting">Hosting</option>
                            <option value="Domain">Domain</option>
                            <option value="Webseite-Verwaltung">Webseite-Verwaltung</option>
                            <option value="Email-Service">Email-Service</option>
                        </optgroup>
                        <optgroup label="Geschäftliches">
                            <option value="Buchhaltung-Software">Buchhaltung-Software</option>
                            <option value="Projektmanagement">Projektmanagement</option>
                            <option value="CRM">CRM</option>
                            <option value="Versicherung">Versicherung</option>
                        </optgroup>
                        <optgroup label="Marketing & Kommunikation">
                            <option value="Social Media Tools">Social Media Tools</option>
                            <option value="Email-Marketing">Email-Marketing</option>
                            <option value="SEO-Tools">SEO-Tools</option>
                            <option value="Anzeigen">Anzeigen (Ads)</option>
                        </optgroup>
                        <optgroup label="Raum & Nebenkosten">
                            <option value="Miete Büro">Miete Büro</option>
                            <option value="Nebenkosten">Nebenkosten</option>
                            <option value="Internet">Internet</option>
                            <option value="Telefon">Telefon</option>
                        </optgroup>
                        <optgroup label="Fahrzeug & Reisen">
                            <option value="Fahrzeug-Kosten">Fahrzeug-Kosten</option>
                            <option value="Benzin">Benzin</option>
                            <option value="Reisekosten">Reisekosten</option>
                        </optgroup>
                        <optgroup label="Sonstiges">
                            <option value="Fortbildung">Fortbildung</option>
                            <option value="Sonstiges">Sonstiges</option>
                        </optgroup>
                    </select>
                </div>
                <div>
                    <label>Klassifizierung</label>
                    <select id="editCostType">
                        <option value="geschäftlich">Geschäftlich</option>
                        <option value="privat">Privat</option>
                        <option value="gemischt">Gemischt (50/50)</option>
                    </select>
                </div>
            </div>
            <div class="modal-buttons">
                <button class="btn-save" onclick="saveEdit()">Speichern</button>
                <button class="btn-cancel" onclick="closeEditModal()">Abbrechen</button>
            </div>
        </div>
    </div>

    <script>
        // Google Apps Script URL
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz1LJMQhQjDwY-dXceG0HgxvB23LoHUKTpwxGBA4wCxqp5zI_PpQf0Pcht9B8S6HUL4/exec';

        let costs = JSON.parse(localStorage.getItem('fixkosten')) || [];
        let editingIndex = null;

        function saveCostsToGoogle() {
            costs.forEach((cost, index) => {
                fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'addCost',
                        kostenname: cost.name,
                        betrag: cost.amount,
                        kategorie: cost.category,
                        klassifizierung: cost.type,
                        index: index
                    })
                }).catch(err => console.error('Google Sheets sync:', err));
            });
        }

        function addCost() {
            const name = document.getElementById('costName').value.trim();
            const amount = parseFloat(document.getElementById('costAmount').value);
            const category = document.getElementById('costCategory').value;
            const type = document.getElementById('costType').value;

            if (!name || !amount || !category) {
                alert('Bitte alle Felder ausfüllen!');
                return;
            }

            costs.push({ name, amount, category, type });
            localStorage.setItem('fixkosten', JSON.stringify(costs));
            saveCostsToGoogle();

            document.getElementById('costName').value = '';
            document.getElementById('costAmount').value = '';
            document.getElementById('costCategory').value = '';
            document.getElementById('costType').value = 'geschäftlich';

            showMessage('✅ Fixkosten hinzugefügt!');
            renderTable();
            updateStats();
        }

        function deleteCost(index) {
            if (confirm('Diese Fixkosten wirklich löschen?')) {
                costs.splice(index, 1);
                localStorage.setItem('fixkosten', JSON.stringify(costs));
                saveCostsToGoogle();
                renderTable();
                updateStats();
                showMessage('🗑️ Gelöscht!');
            }
        }

        function editCost(index) {
            editingIndex = index;
            const cost = costs[index];
            document.getElementById('editCostName').value = cost.name;
            document.getElementById('editCostAmount').value = cost.amount;
            document.getElementById('editCostCategory').value = cost.category;
            document.getElementById('editCostType').value = cost.type;
            document.getElementById('editModal').classList.add('active');
        }

        function saveEdit() {
            const name = document.getElementById('editCostName').value.trim();
            const amount = parseFloat(document.getElementById('editCostAmount').value);
            const category = document.getElementById('editCostCategory').value;
            const type = document.getElementById('editCostType').value;

            if (!name || !amount || !category) {
                alert('Bitte alle Felder ausfüllen!');
                return;
            }

            costs[editingIndex] = { name, amount, category, type };
            localStorage.setItem('fixkosten', JSON.stringify(costs));
            saveCostsToGoogle();
            closeEditModal();
            showMessage('✅ Aktualisiert!');
            renderTable();
            updateStats();
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        function renderTable() {
            const container = document.getElementById('tableContainer');

            if (costs.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📋</div><p>Noch keine Fixkosten erfasst.</p></div>';
                return;
            }

            let html = '<table><thead><tr><th>Kostenname</th><th>Monat</th><th>Kategorie</th><th>Typ</th><th>Aktionen</th></tr></thead><tbody>';

            costs.forEach((cost, index) => {
                html += `
                    <tr>
                        <td>${cost.name}</td>
                        <td>€ ${cost.amount.toFixed(2).replace('.', ',')}</td>
                        <td>${cost.category}</td>
                        <td>${cost.type === 'gemischt' ? '50/50' : cost.type}</td>
                        <td>
                            <button class="btn-edit" onclick="editCost(${index})">Bearbeiten</button>
                            <button class="btn-delete" onclick="deleteCost(${index})">Löschen</button>
                        </td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function updateStats() {
            let total = 0, business = 0, personal = 0;

            costs.forEach(cost => {
                if (cost.type === 'geschäftlich') {
                    business += cost.amount;
                    total += cost.amount;
                } else if (cost.type === 'privat') {
                    personal += cost.amount;
                    total += cost.amount;
                } else if (cost.type === 'gemischt') {
                    business += cost.amount * 0.5;
                    personal += cost.amount * 0.5;
                    total += cost.amount;
                }
            });

            document.getElementById('totalAmount').textContent = '€ ' + total.toFixed(2).replace('.', ',');
            document.getElementById('businessAmount').textContent = '€ ' + business.toFixed(2).replace('.', ',');
            document.getElementById('privateAmount').textContent = '€ ' + personal.toFixed(2).replace('.', ',');
        }

        function showMessage(msg) {
            const el = document.getElementById('successMessage');
            el.textContent = msg;
            el.style.opacity = '1';
            setTimeout(() => el.style.opacity = '0', 3000);
        }

        // Initialize
        renderTable();
        updateStats();
    </script>
</body>
</html>
