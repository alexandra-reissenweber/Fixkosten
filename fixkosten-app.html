<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Fixkosten - Branddesignerin</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --beige-light: #F5E6D3;
            --beige-medium: #EAD8C3;
            --beige-dark: #D4B896;
            --beige-text: #5C4A3D;
            --accent: #8B6F47;
            --success: #7BA875;
            --danger: #C9605B;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #F5E6D3 0%, #EAD8C3 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--beige-text);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            color: var(--accent);
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .subtitle {
            font-size: 14px;
            color: #8B7355;
            opacity: 0.8;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(92, 74, 61, 0.1);
            border: 1px solid var(--beige-light);
        }

        .card h2 {
            color: var(--accent);
            font-size: 20px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--beige-light);
            padding-bottom: 12px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--beige-text);
            font-size: 14px;
        }

        input[type="text"],
        input[type="number"],
        input[type="date"],
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--beige-medium);
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            background: #FAFAF8;
            color: var(--beige-text);
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        input[type="date"]:focus,
        select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(139, 111, 71, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-submit {
            background: var(--accent);
            color: white;
        }

        .btn-submit:hover {
            background: #7A5C3F;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(139, 111, 71, 0.3);
        }

        .btn-reset {
            background: var(--beige-light);
            color: var(--beige-text);
        }

        .btn-reset:hover {
            background: var(--beige-medium);
        }

        .success-message {
            display: none;
            background: #E8F5E9;
            border-left: 4px solid var(--success);
            padding: 14px;
            border-radius: 6px;
            margin-bottom: 20px;
            color: var(--success);
            font-size: 14px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .dashboard {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(92, 74, 61, 0.1);
            border: 1px solid var(--beige-light);
            grid-column: 1 / -1;
        }

        .dashboard h2 {
            color: var(--accent);
            font-size: 20px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--beige-light);
            padding-bottom: 12px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        .stat-box {
            background: var(--beige-light);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: #8B7355;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
        }

        .chart-container {
            position: relative;
            height: 300px;
            margin: 30px 0;
        }

        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th {
            background: var(--beige-light);
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: var(--accent);
            border-bottom: 2px solid var(--beige-medium);
        }

        td {
            padding: 12px;
            border-bottom: 1px solid var(--beige-light);
        }

        tr:hover {
            background: var(--beige-light);
            opacity: 0.5;
        }

        .category-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .category-geschaeftlich {
            background: #C8E6C9;
            color: #2E7D32;
        }

        .category-privat {
            background: #FFCCCC;
            color: #C62828;
        }

        .category-gemischt {
            background: #FFF9C4;
            color: #F57F17;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #8B7355;
            font-style: italic;
        }

        .delete-btn {
            background: #FFCCCC;
            color: #C62828;
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .delete-btn:hover {
            background: #FF9999;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💼 Meine Fixkosten</h1>
            <p class="subtitle">Einfache Verwaltung für Branddesignerinnen</p>
        </header>

        <div class="main-grid">
            <div class="card">
                <h2>📝 Neue Ausgabe eintragen</h2>

                <div class="success-message" id="successMessage">
                    ✓ Ausgabe gespeichert! Sie wird automatisch zu Google Sheets hinzugefügt.
                </div>

                <form id="expenseForm">
                    <div class="form-group">
                        <label for="datum">Datum</label>
                        <input type="date" id="datum" required>
                    </div>

                    <div class="form-group">
                        <label for="ausgabeArt">Art der Ausgabe</label>
                        <select id="ausgabeArt" required>
                            <option value="">-- Bitte wählen --</option>
                            <optgroup label="Designsoftware & Tools">
                                <option value="Adobe Creative Cloud">Adobe Creative Cloud</option>
                                <option value="Figma">Figma</option>
                                <option value="Schriften & Assets">Schriften & Assets</option>
                                <option value="Moodboards/Referenz">Moodboards/Referenzmaterial</option>
                                <option value="Online-Kurse Design">Online-Kurse (Design)</option>
                            </optgroup>
                            <optgroup label="Webseite & Portfolio">
                                <option value="Hosting/Domain">Hosting/Domain</option>
                                <option value="Portfolio-Plattform">Portfolio-Plattform (Behance, etc.)</option>
                                <option value="Website-Tools">Website-Tools</option>
                            </optgroup>
                            <optgroup label="Geschäftliches">
                                <option value="Versicherung">Versicherung (Berufs-/Betriebshaftpflicht)</option>
                                <option value="Buchhaltung/Steuer">Buchhaltung/Steuerberatung</option>
                                <option value="Büromaterial">Büromaterial</option>
                                <option value="Büroausstattung">Büroausstattung</option>
                            </optgroup>
                            <optgroup label="Marketing & Kommunikation">
                                <option value="Social Media Tools">Social Media Tools</option>
                                <option value="E-Mail Marketing">E-Mail Marketing</option>
                                <option value="Telefon/Internet">Telefon/Internet (beruflich)</option>
                            </optgroup>
                            <optgroup label="Raum & Nebenkosten">
                                <option value="Miete/Pacht">Miete/Pacht (Büroraum)</option>
                                <option value="Nebenkosten Büro">Nebenkosten Büro</option>
                            </optgroup>
                            <optgroup label="Fahrzeug & Reisen">
                                <option value="Fahrzeugkosten">Fahrzeugkosten (geschäftlich)</option>
                                <option value="Reisekosten">Reisekosten (Kundenbesuche)</option>
                            </optgroup>
                            <optgroup label="Sonstiges">
                                <option value="Sonstiges">Sonstiges</option>
                            </optgroup>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="empaenger">Empfänger</label>
                        <input type="text" id="empaenger" placeholder="z.B. Adobe, GoDaddy, Versicherung XY" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="betrag">Betrag (€)</label>
                            <input type="number" id="betrag" step="0.01" placeholder="0.00" required>
                        </div>

                        <div class="form-group">
                            <label for="kategorie">Kategorie</label>
                            <select id="kategorie" required>
                                <option value="">-- Bitte wählen --</option>
                                <option value="geschaeftlich">💼 Geschäftlich</option>
                                <option value="privat">👤 Privat</option>
                                <option value="gemischt">⚖️ Gemischt (anteilig)</option>
                            </select>
                        </div>
                    </div>

                    <div class="button-group">
                        <button type="submit" class="btn-submit">Speichern</button>
                        <button type="reset" class="btn-reset">Leeren</button>
                    </div>
                </form>
            </div>

            <div class="card">
                <h2>📊 Diese Übersicht</h2>

                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-label">Gesamt</div>
                        <div class="stat-value" id="totalAmount">€ 0,00</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Geschäftlich</div>
                        <div class="stat-value" id="businessAmount" style="color: #2E7D32;">€ 0,00</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Privat</div>
                        <div class="stat-value" id="privateAmount" style="color: #C62828;">€ 0,00</div>
                    </div>
                </div>

                <div class="chart-container">
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>
        </div>

        <div class="dashboard">
            <h2>📋 Alle Einträge</h2>
            <div class="table-container" id="tableContainer">
                <p class="no-data">Keine Einträge vorhanden</p>
            </div>
        </div>
    </div>

    <script>
        const spreadsheetId = '1nW5aIq2Isf4hFtdhnrC5jWAoggQyHlDxQ8J5zSROBSI';
        let expenses = [];

        document.getElementById('datum').valueAsDate = new Date();

        document.getElementById('expenseForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const datum = document.getElementById('datum').value;
            const ausgabeArt = document.getElementById('ausgabeArt').value;
            const empaenger = document.getElementById('empaenger').value;
            const betrag = document.getElementById('betrag').value;
            const kategorie = document.getElementById('kategorie').value;

            const newExpense = {
                datum,
                ausgabeArt,
                empaenger,
                betrag: parseFloat(betrag),
                kategorie
            };

            expenses.push(newExpense);

            await saveToGoogleSheets(newExpense);

            const successMsg = document.getElementById('successMessage');
            successMsg.style.display = 'block';
            setTimeout(() => {
                successMsg.style.display = 'none';
            }, 3000);

            document.getElementById('expenseForm').reset();
            document.getElementById('datum').valueAsDate = new Date();

            updateDashboard();
        });

        async function saveToGoogleSheets(expense) {
            try {
                const response = await fetch('https://script.google.com/macros/s/AKfycbz1LJMQhQjDwY-dXceG0HgxvB23LoHUKTpwxGBA4wCxqp5zI_PpQf0Pcht9B8S6HUL4/exec', {
                    method: 'POST',
                    body: JSON.stringify(expense)
                });
                console.log('Daten gespeichert!');
            } catch (error) {
                console.log('Lokal gespeichert (Sheet-Anbindung wird noch eingerichtet)');
            }
        }

        function updateDashboard() {
            const total = expenses.reduce((sum, e) => sum + e.betrag, 0);
            const business = expenses.reduce((sum, e) => sum + (e.kategorie === 'geschaeftlich' ? e.betrag : 0), 0);
            const private = expenses.reduce((sum, e) => sum + (e.kategorie === 'privat' ? e.betrag : 0), 0);

            document.getElementById('totalAmount').textContent = `€ ${total.toFixed(2).replace('.', ',')}`;
            document.getElementById('businessAmount').textContent = `€ ${business.toFixed(2).replace('.', ',')}`;
            document.getElementById('privateAmount').textContent = `€ ${private.toFixed(2).replace('.', ',')}`;

            updateTable();
            updateChart();
        }

        function updateTable() {
            const container = document.getElementById('tableContainer');

            if (expenses.length === 0) {
                container.innerHTML = '<p class="no-data">Keine Einträge vorhanden</p>';
                return;
            }

            let html = '<table><thead><tr><th>Datum</th><th>Ausgabe</th><th>Empfänger</th><th>Betrag</th><th>Kategorie</th><th>Aktion</th></tr></thead><tbody>';

            expenses.forEach((expense, index) => {
                const categoryClass = `category-${expense.kategorie}`;
                const categoryLabel = {
                    'geschaeftlich': '💼 Geschäftlich',
                    'privat': '👤 Privat',
                    'gemischt': '⚖️ Gemischt'
                }[expense.kategorie];

                html += `
                    <tr>
                        <td>${new Date(expense.datum).toLocaleDateString('de-DE')}</td>
                        <td>${expense.ausgabeArt}</td>
                        <td>${expense.empaenger}</td>
                        <td>€ ${expense.betrag.toFixed(2).replace('.', ',')}</td>
                        <td><span class="category-badge ${categoryClass}">${categoryLabel}</span></td>
                        <td><button class="delete-btn" onclick="deleteExpense(${index})">Löschen</button></td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function deleteExpense(index) {
            expenses.splice(index, 1);
            updateDashboard();
        }

        function updateChart() {
            const ctx = document.getElementById('categoryChart').getContext('2d');

            const business = expenses.filter(e => e.kategorie === 'geschaeftlich').reduce((sum, e) => sum + e.betrag, 0);
            const private = expenses.filter(e => e.kategorie === 'privat').reduce((sum, e) => sum + e.betrag, 0);
            const mixed = expenses.filter(e => e.kategorie === 'gemischt').reduce((sum, e) => sum + e.betrag, 0);

            if (window.categoryChart) {
                window.categoryChart.destroy();
            }

            window.categoryChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['💼 Geschäftlich', '👤 Privat', '⚖️ Gemischt'],
                    datasets: [{
                        data: [business, private, mixed],
                        backgroundColor: ['#C8E6C9', '#FFCCCC', '#FFF9C4'],
                        borderColor: ['#2E7D32', '#C62828', '#F57F17'],
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
